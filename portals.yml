# Portal Scanner Configuration — Santosh Govardhan
# Companies and search queries for /career-ops scan

# Target role keywords
title_filter:
  positive:
    - "data analyst"
    - "product analyst"
    - "business analyst"
    - "operations analyst"
    - "strategy analyst"
    - "analytics"
    - "insights"
    - "associate product manager"
    - "APM"
    - "founder's office"
    - "chief of staff"
    - "strategy"
    - "BI analyst"
    - "growth analyst"
  negative:
    - "intern"
    - "fresher"
    - "junior"
    - "entry level"
    - "0-1 years"
    - "0-2 years"
    - "marketing analyst"
    - "financial analyst"
    - "HR analyst"
    - "recruiter"

