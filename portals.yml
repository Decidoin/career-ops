      base_url: "https://www.gulftalent.com"
    - name: "LinkedIn UAE"
      base_url: "https://www.linkedin.com/jobs"
      search_hint: "Use location filter: Dubai, United Arab Emirates"
    - name: "Indeed UAE"
      base_url: "https://ae.indeed.com"

