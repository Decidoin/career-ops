      base_url: "https://www.linkedin.com/jobs"
      search_hint: "Use location filter: Bangalore/Bengaluru"
    - name: "Naukri"
      base_url: "https://www.naukri.com"
    - name: "Foundit (ex-Monster)"
      base_url: "https://www.foundit.in"
    - name: "Indeed India"
      base_url: "https://in.indeed.com"
    - name: "Glassdoor India"
      base_url: "https://www.glassdoor.co.in/Job"
    - name: "Instahyre"
      base_url: "https://www.instahyre.com"
      notes: "Startup-focused, good for product analytics roles"
    - name: "Wellfound (AngelList)"
      base_url: "https://wellfound.com/jobs"
      notes: "Startup jobs, equity-heavy roles"

  dubai:
    - name: "Bayt"
      base_url: "https://www.bayt.com"
      notes: "Largest job board in MENA"
