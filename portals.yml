# Portal Scanner Configuration
# Companies and search queries for /career-ops scan

# Target role keywords
title_filter:
  positive:
    - "mechanism design"
    - "governance"
    - "incentive"
    - "protocol"
    - "research"
    - "economist"
    - "coordination"
    - "agent"
    - "head of"
    - "director"
    - "principal"
    - "founding"
    - "VP"
  negative:
    - "intern"
    - "junior"
    - "associate"
    - "analyst"
    - "support"
    - "marketing"
    - "sales"
    - "recruiter"

