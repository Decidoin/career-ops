<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10pt;
    line-height: 1.45;
    color: #1a1a1a;
    max-width: 8.5in;
    margin: 0 auto;
  }

  h1 {
    font-size: 20pt;
    font-weight: 700;
    margin-bottom: 4px;
    color: #0a0a0a;
  }

  .contact {
    font-size: 9pt;
    color: #555;
    margin-bottom: 16px;
  }

  .contact a { color: #555; text-decoration: none; }

  h2 {
    font-size: 11pt;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #0a0a0a;
    border-bottom: 1.5px solid #0a0a0a;
    padding-bottom: 3px;
    margin-top: 14px;
    margin-bottom: 8px;
  }

  .summary {
    font-size: 10pt;
    color: #333;
    margin-bottom: 4px;
  }

  .role-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
    margin-bottom: 2px;
  }

  .role-title {
    font-weight: 600;
    font-size: 10.5pt;
  }

  .role-date {
    font-size: 9pt;
    color: #666;
    white-space: nowrap;
  }

  .role-company {
    font-size: 9.5pt;
    color: #444;
    font-style: italic;
    margin-bottom: 4px;
  }

  .client-name {
    font-weight: 600;
    font-size: 9.5pt;
    color: #333;
    margin-top: 6px;
    margin-bottom: 2px;
  }

  ul {
    padding-left: 16px;
    margin-bottom: 4px;
  }

  li {
    margin-bottom: 2px;
    font-size: 9.5pt;
    color: #333;
  }

  .skills-grid {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 2px 12px;
    font-size: 9.5pt;
  }

  .skill-category {
    font-weight: 600;
    color: #333;
  }

  .publications li, .speaking li {
    font-size: 9.5pt;
    margin-bottom: 3px;
  }

  .education-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 2px;
    font-size: 9.5pt;
  }

  @media print {
    body { margin: 0; }
  }
</style>
</head>
<body>

<h1>{{NAME}}</h1>
<div class="contact">
  {{LOCATION}} · {{EMAIL}} · {{LINKEDIN}} · {{WEBSITE}}
</div>

<h2>Summary</h2>
<p class="summary">{{SUMMARY}}</p>

<h2>Experience</h2>
{{EXPERIENCE}}

<h2>Research & Publications</h2>
<ul class="publications">
{{PUBLICATIONS}}
</ul>

<h2>Speaking</h2>
<ul class="speaking">
{{SPEAKING}}
</ul>

<h2>Education</h2>
{{EDUCATION}}

<h2>Skills</h2>
<div class="skills-grid">
{{SKILLS}}
</div>

</body>
</html>
