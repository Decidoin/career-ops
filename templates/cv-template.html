<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{NAME}} — CV</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 10pt;
    line-height: 1.45;
    color: #1a1a1a;
    max-width: 8.5in;
    margin: 0 auto;
  }

  h1 {
    font-size: 20pt;
    font-weight: 700;
    margin-bottom: 4px;
    color: #0a0a0a;
    text-align: center;
  }

  .tagline {
    font-size: 9.5pt;
    color: #444;
    text-align: center;
    margin-bottom: 4px;
  }

  .contact {
    font-size: 9pt;
    color: #555;
    margin-bottom: 16px;
    text-align: center;
  }

  .contact a { color: #555; text-decoration: none; }

  h2 {
    font-size: 10.5pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #0a0a0a;
    border-bottom: 1.5px solid #0a0a0a;
    padding-bottom: 3px;
    margin-top: 14px;
    margin-bottom: 8px;
  }

  .summary {
    font-size: 9.5pt;
    color: #333;
    margin-bottom: 4px;
  }

  .role-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-top: 10px;
    margin-bottom: 1px;
  }

  .role-title {
    font-weight: 600;
    font-size: 10pt;
  }

  .role-date {
    font-size: 9pt;
    color: #666;
    white-space: nowrap;
  }

  .role-company {
    font-size: 9pt;
    color: #444;
    font-style: italic;
    margin-bottom: 4px;
  }

  ul {
    padding-left: 16px;
    margin-bottom: 4px;
  }

  li {
    margin-bottom: 2px;
    font-size: 9.5pt;
    color: #333;
  }

  .skills-row {
    font-size: 9.5pt;
    margin-bottom: 3px;
  }

  .skill-label {
    font-weight: 600;
    color: #333;
  }

  .certs {
    font-size: 9.5pt;
    color: #333;
  }

  .education-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 3px;
    font-size: 9.5pt;
  }

  .edu-left { font-weight: 600; }
  .edu-right { color: #555; font-size: 9pt; white-space: nowrap; }
  .edu-sub { font-size: 9pt; color: #555; }

  @media print {
    body { margin: 0; }
  }
</style>
</head>
<body>

<h1>{{NAME}}</h1>
<div class="tagline">{{TAGLINE}}</div>
<div class="contact">
  {{LOCATION}} · {{PHONE}} · {{EMAIL}} · {{LINKS}}
</div>

<h2>Summary</h2>
<p class="summary">{{SUMMARY}}</p>

<h2>Professional Experience</h2>
{{EXPERIENCE}}

<h2>Projects & Publications</h2>
<ul>
{{PUBLICATIONS}}
</ul>

<h2>Skills</h2>
{{SKILLS}}

<h2>Education</h2>
{{EDUCATION}}

<h2>Certifications</h2>
<p class="certs">{{CERTIFICATIONS}}</p>

</body>
</html>
